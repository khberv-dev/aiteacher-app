name: ai_teacher
description: "My AI Teacher app for students"
publish_to: 'none'
version: 1.1.0+6

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  talker_dio_logger: ^4.7.6
  shared_preferences: ^2.3.3
  pinput: ^5.0.1
  record: ^6.1.1
  path_provider: ^2.1.5
  socket_io_client: ^3.0.2
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.0
  flutter_webrtc: ^0.12.0
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/

flutter_launcher_icons:
  image_path: assets/images/brand.png
  android: true
  ios: true
  remove_alpha_ios: true